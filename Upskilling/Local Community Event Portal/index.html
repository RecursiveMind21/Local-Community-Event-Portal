<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Community Event Portal</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
      }

      nav {
        background-color: #1e293b;
        padding: 15px;
        text-align: center;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin: 0 10px;
        font-weight: bold;
      }

      #welcomeBanner {
        background: grey;
        color: white;
        padding: 15px;
        text-align: center;
        border-radius: 8px;
        margin: 20px;
      }

      .highlight {
        background-color: #facc15;
        color: #1e293b;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
      }

      section {
        background-color: white;
        margin: 20px;
        padding: 20px;
        border-radius: 8px;
      }

      table {
        margin: auto;
        border-spacing: 20px;
      }

      .eventImage {
        width: 220px;
        height: 150px;
        border: 4px solid #1e293b;
        border-radius: 8px;
        transition: 0.3s;
      }

      figure {
        text-align: center;
      }

      figcaption {
        margin-top: 8px;
        font-weight: bold;
      }

      form {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 2px solid #d1d5db;
        border-radius: 5px;
        box-sizing: border-box;
      }

      button {
        background-color: #1e293b;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      output {
        color: green;
        font-weight: bold;
      }

      video {
        width: 100%;
        border-radius: 8px;
      }

      footer {
        background-color: #1e293b;
        padding: 15px;
        text-align: center;
      }

      footer a {
        color: white;
        text-decoration: none;
      }
    </style>

    <script>
      function validatePhone() {
        let phone = document.getElementById("phone").value;

        if (phone.length !== 10 || isNaN(phone)) {
          alert("Enter a valid 10-digit phone number");
        }
      }

      function showFee() {
        let eventType = document.getElementById("eventType").value;
        let fee = "";

        if (eventType === "music") {
          fee = "₹500";
        } else if (eventType === "sports") {
          fee = "₹300";
        } else if (eventType === "cleanup") {
          fee = "₹100";
        }

        document.getElementById("eventFee").innerHTML =
          "Event Fee: " + fee;

        localStorage.setItem("preferredEvent", eventType);
      }

      function submitForm() {
        document.getElementById("confirmation").value =
          "Registration Submitted Successfully!";
      }

      function enlargeImage(image) {
        image.style.width = "400px";
        image.style.height = "250px";
      }

      function countCharacters() {
        let text = document.getElementById("feedback").value;

        document.getElementById("charCount").innerHTML =
          "Characters: " + text.length;
      }

      function videoReady() {
        document.getElementById("videoMessage").innerHTML =
          "Video ready to play";
      }

      function clearPreferences() {
        localStorage.clear();
        sessionStorage.clear();

        alert("Preferences Cleared");
      }

      function findLocation() {
        navigator.geolocation.getCurrentPosition(
          showPosition,
          showError,
          {
            enableHighAccuracy: true,
            timeout: 5000,
          }
        );
      }

      function showPosition(position) {
        document.getElementById("location").innerHTML =
          "Latitude: " +
          position.coords.latitude +
          "<br>Longitude: " +
          position.coords.longitude;
      }

      function showError(error) {
        if (error.code === 1) {
          alert("Permission Denied");
        } else if (error.code === 3) {
          alert("Location Request Timed Out");
        }
      }

      window.onload = function () {
        let savedEvent = localStorage.getItem("preferredEvent");

        if (savedEvent) {
          document.getElementById("eventType").value = savedEvent;
        }
      };

      window.onbeforeunload = function () {
        return "Your form is not finished!";
      };
    </script>
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="#home"> Home </a>
      <a href="#events"> Events </a>
      <a href="#contacts"> Contacts </a>
    </nav>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
      Welcome back to the
      <span class="highlight">Community Portal</span>

      <br />

      <span style="color: red; font-weight: bold">
        Special Offer: Free Event Entry!
      </span>
    </div>

    <!-- Events -->
    <section id="events">
      <h2>Past Community Events</h2>

      <table>
        <tr>
          <td>
            <figure>
              <img
                src="event1.jpg"
                alt="Music Event"
                title="Music Event"
                class="eventImage"
                ondblclick="enlargeImage(this)"
              />
              <figcaption>Music Festival Event</figcaption>
            </figure>
          </td>

          <td>
            <figure>
              <img
                src="event2.jpg"
                alt="Donation Event"
                title="Donation Event"
                class="eventImage"
                ondblclick="enlargeImage(this)"
              />
              <figcaption>Food Donation Drive</figcaption>
            </figure>
          </td>
        </tr>
      </table>
    </section>

    <!-- Registration Form -->
    <section id="registration">
      <h2>Event Registration Form</h2>

      <form>
        <label>Name:</label>
        <input
          type="text"
          placeholder="Enter your name"
          required
          autofocus
        />

        <br /><br />

        <label>Email:</label>
        <input
          type="email"
          placeholder="Enter your email"
          required
        />

        <br /><br />

        <label>Phone:</label>
        <input
          type="text"
          id="phone"
          onblur="validatePhone()"
          placeholder="Enter phone number"
        />

        <br /><br />

        <label>Event Type:</label>

        <select id="eventType" onchange="showFee()">
          <option value="">Select Event</option>
          <option value="music">Music Festival</option>
          <option value="sports">Sports Competition</option>
          <option value="cleanup">Cleanup Campaign</option>
        </select>

        <p id="eventFee"></p>

        <label>Feedback:</label>

        <textarea
          id="feedback"
          onkeyup="countCharacters()"
          placeholder="Enter feedback"
        ></textarea>

        <p id="charCount">Characters: 0</p>

        <button type="button" onclick="submitForm()">
          Submit
        </button>

        <br /><br />

        <output id="confirmation"></output>
      </form>
    </section>

    <!-- Promo Video -->
    <section>
      <h2>Event Promo Video</h2>

      <video controls oncanplay="videoReady()">
        <source src="promo.mp4" type="video/mp4" />
      </video>

      <p id="videoMessage"></p>
    </section>

    <!-- Geolocation -->
    <section>
      <h2>Find Nearby Events</h2>

      <button onclick="findLocation()">
        Find Nearby Events
      </button>

      <p id="location"></p>
    </section>

    <!-- Preferences -->
    <section>
      <h2>User Preferences</h2>

      <button onclick="clearPreferences()">
        Clear Preferences
      </button>
    </section>

    <!-- Contacts -->
    <section id="contacts">
      Contacts
    </section>

    <!-- Footer -->
    <footer>
      <a href="help.html" target="_blank"> Help </a>
    </footer>
  </body>
</html>
